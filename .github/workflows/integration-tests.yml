name: Integration Tests

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types:
      - completed
  workflow_dispatch:

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 19
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '19'
          cache: 'sbt'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull service Docker image
        run: |
          IMAGE=$(echo "ghcr.io/${{ github.repository }}/gene-browser:latest" | tr '[:upper:]' '[:lower:]')
          docker pull $IMAGE
          docker tag $IMAGE gene-browser:latest

      - name: Start containers
        run: docker compose -f docker-compose.it.yml up -d

      - name: Wait for service to be ready
        run: |
          echo "Waiting for gene-browser-service..."
          timeout 90 bash -c '
            until curl -sf http://localhost:8080/species > /dev/null 2>&1; do
              sleep 3
            done
          '
          echo "Service is ready."

      - name: Run integration tests
        run: |
          curl -Ls https://git.io/sbt > sbt
          chmod +x sbt
          ./sbt integrationTest

      - name: Tear down containers
        if: always()
        run: docker compose -f docker-compose.it.yml down -v
