services:
  postgres:
    image: postgres:16-alpine
    container_name: it-postgres
    environment:
      POSTGRES_DB: gene_browser
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  gene-browser-service:
    image: gene-browser:latest
    container_name: it-gene-browser-service
    entrypoint: ["java", "-cp", "/opt/docker/lib/*", "juntendouniversity.genebrowser.Main"]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: gene_browser
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
