apiVersion: apps/v1
kind: Deployment
metadata:
  name: gene-browser-service
  namespace: gene-browser
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gene-browser-service
  template:
    metadata:
      labels:
        app: gene-browser-service
    spec:
      containers:
      - name: gene-browser-service
        image: ghcr.io/danromfork/gene-browser/gene-browser:latest
        imagePullPolicy: Always
        command: ["java"]
        args: ["-cp", "/opt/docker/lib/*", "juntendouniversity.genebrowser.Main"]
        ports:
        - containerPort: 8080
        env:
        - name: DATABASE_HOST
          value: "postgres"
        - name: DATABASE_PORT
          value: "5432"
        - name: DATABASE_NAME
          value: "gene_browser"
        - name: DATABASE_USER
          value: "postgres"
        - name: DATABASE_PASSWORD
          value: "postgres"
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gene-browser-service
  namespace: gene-browser
spec:
  type: LoadBalancer
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: gene-browser-service
